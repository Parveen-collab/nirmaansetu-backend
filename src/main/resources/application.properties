spring.application.name=backend

# Common configurations
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}

# Hikari Connection Pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Encryption secret
app.encryption.secret-key=${ENCRYPTION_SECRET}

# JWT configuration
jwt.secret=${JWT_SECRET:your-very-secure-secret-key-that-is-at-least-256-bits-long}
jwt.expiration.access=3600000
jwt.expiration.refresh=604800000

# Soft delete cleanup settings
app.cleanup.user.retention-hours=24
app.cleanup.user.cron=0 0 * * * *

# Set default profile to dev
spring.profiles.active=dev

spring.data.redis.host=localhost
spring.data.redis.port=6379
