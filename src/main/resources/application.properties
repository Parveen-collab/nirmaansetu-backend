spring.application.name=backend

spring.datasource.url=jdbc:mysql://localhost:3306/nirmaansetu
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

twilio.account-sid=${TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER}

# Maximum number of idle connections in the pool
spring.datasource.hikari.maximum-pool-size=10

# Minimum number of idle connections (keeps pool warm)
spring.datasource.hikari.minimum-idle=5

# How long a connection can sit idle before being retired (10 mins)
spring.datasource.hikari.idle-timeout=600000

# Maximum lifetime of a connection in the pool (30 mins)
spring.datasource.hikari.max-lifetime=1800000

# How long to wait for a connection from the pool before throwing an exception (30s)
spring.datasource.hikari.connection-timeout=30000

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always