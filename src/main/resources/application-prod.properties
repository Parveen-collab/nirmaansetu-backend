# Production-specific settings
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Production logging level
logging.level.root=WARN
logging.level.com.nirmaansetu.backend=INFO

# ELK Logstash Destination
logging.logstash.destination=${LOGSTASH_DESTINATION:localhost:5044}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD:}

spring.ai.vectorstore.elasticsearch.uris=${ELASTICSEARCH_URL}

jwt.secret=${JWT_SECRET}

spring.ai.openai.api-key=${OPENAI_API_KEY}

twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}

spring.elasticsearch.username=${ELASTICSEARCH_USERNAME:}
spring.elasticsearch.password=${ELASTICSEARCH_PASSWORD:}
spring.application.name=nirmaansetu-backend
