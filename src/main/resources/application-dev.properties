# Database
spring.datasource.url=jdbc:mysql://localhost:3306/nirmaansetu?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:your_mysql_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# JWT
jwt.secret=ThisIsMyDevelopmentSecretKey12345678901234567890

# Encryption
app.encryption.secret-key=12345678901234567890123456789012

# Twilio (Optional)
twilio.account-sid=
twilio.auth-token=
twilio.phone-number=

# Development Logging
logging.level.root=INFO
logging.level.com.nirmaansetu.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE