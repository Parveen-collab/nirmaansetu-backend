# Test specific configurations
#✅ What this does:
#Uses H2 Database (not MySQL)
#Runs in memory (RAM) → super fast ⚡
#Automatically:
#Creates tables at start
#Deletes them after tests
#🧠 Important parts:
#🔹 jdbc:h2:mem:testdb
#Temporary DB → gone after test ends
#🔹 MODE=MySQL
#Makes H2 behave like MySQL (very smart 👌)
#🔹 create-drop
#Creates schema → runs test → deletes schema
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Encryption secret
#👉 Dummy key for:
#Encrypting data
#Testing security features
app.encryption.secret-key=MySuperSecretKey

# Twilio (dummy values for tests)
#👉 Fake credentials for:
#OTP / SMS testing
#💡 Prevents:
#Real SMS sending ❌
#Cost ❌
twilio.account-sid=ACtest
twilio.auth-token=test-token
twilio.phone-number=+1234567890

# Redis (mock or disable if needed)
#👉 Disable Redis for tests to avoid dependency on a running Redis instance
spring.cache.type=simple
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
#✅ What this does:
#Defines JWT token behavior
#🔹 Secret
#Used to sign tokens
#🔹 Expiry:
#Access token → 1 hour
#Refresh token → 7 days
jwt.secret=test-secret-key-that-is-at-least-256-bits-long-for-testing-purposes
jwt.expiration.access=3600000
jwt.expiration.refresh=604800000
