# Test specific configurations
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Encryption secret
app.encryption.secret-key=MySuperSecretKey

# Twilio (dummy values for tests)
twilio.account-sid=ACtest
twilio.auth-token=test-token
twilio.phone-number=+1234567890

# Redis (mock or disable if needed)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT
jwt.secret=test-secret-key-that-is-at-least-256-bits-long-for-testing-purposes
jwt.expiration.access=3600000
jwt.expiration.refresh=604800000
